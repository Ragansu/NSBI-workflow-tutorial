site_name: Toolkit for Simulaiton-Based Inference
site_description: API documentation for the nsbi-common-utils package
repo_url: https://github.com/jsandesa/nsbi-common-utils

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo

nav:
  - Home: index.md
  - API Reference:
    - Model: api/model.md
    - Inference: api/inference.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: false
            show_root_full_path: false
            members_order: source
            heading_level: 2
            show_signature_annotations: true
            separate_signature: false
            merge_init_into_class: true
            show_bases: true
            show_if_no_docstring: false
            parameter_headings: false

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
