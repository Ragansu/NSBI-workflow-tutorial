data_loader:
  data:
    url: "https://zenodo.org/records/15131565/files/FAIR_Universe_HiggsML_data.zip"
    train_size: 0.35
    processes:
      - htautau
      - ztautau
      - ttbar

  preprocess:
    seed: 42
    selections: >
      DER_mass_transverse_met_lep <= 250.0 and
      DER_mass_vis <= 500.0 and
      DER_sum_pt <= 1000 and
      DER_pt_tot <= 250 and
      DER_deltar_had_lep <= 4.5 and
      DER_pt_h <= 400 and
      DER_pt_ratio_lep_had <= 9.0

  systematics:
    TES_up:
      tes: 1.002
    TES_dn:
      tes: 0.998
    JES_up:
      jes: 1.002
    JES_dn:
      jes: 0.998

  output:
    dir: "./saved_datasets"

# Section for Data Preprocessing
data_preprocessing:

  config_path: "./config.yaml"
  features:
    
    no_jets:
      - PRI_lep_pt
      - PRI_lep_eta
      - PRI_lep_phi
      - PRI_had_pt
      - PRI_had_eta
      - PRI_had_phi
      - PRI_met
      - PRI_met_phi
      - DER_mass_transverse_met_lep
      - DER_mass_vis
      - DER_pt_h
      - DER_deltar_had_lep
      - DER_pt_tot
      - DER_sum_pt
      - DER_pt_ratio_lep_had
      - DER_met_phi_centrality

    one_jet:
      - PRI_jet_leading_pt
      - PRI_jet_leading_eta
      - PRI_jet_leading_phi
      - PRI_jet_all_pt

    two_jets:
      - PRI_jet_subleading_pt
      - PRI_jet_subleading_eta
      - PRI_jet_subleading_phi
      - DER_deltaeta_jet_jet
      - DER_mass_jet_jet
      - DER_prodeta_jet_jet
      - DER_lep_eta_centrality


    n_jets:
      - PRI_n_jets

parameter_fitting:
  configs:
    hist: "./config_hist.yml"   #Configuration file path for histogram settings
    nsbi: "./config.yml" 
  measurement: "higgs_tautau_signal_strength" #Measurement to fit in the analysis.

  output:
    plots_dir: "./output/plots/parameter_fitting"
    logs_dir: "./output/logs/parameter_fitting"
  scan:
    parameter: "mu_htautau"
    range: [0.0, 3.0]
    steps: 50


preselection_network:
  # Path to the original config required by nsbi_common_utils
  nsbi_config: "./config.yml"
  
  model_path: "./saved_datasets/preselection_model/"
  force_train: false
  
  training:
    test_size: 0.2
    random_state: 42
    batch_size: 1024
    epochs: 50
    learning_rate: 0.1
    
    labels:
      htautau: 0
      ttbar: 1
      ztautau: 2
      
  preselection_observable:
    signal_processes: ["htautau"]
    background_processes: ["ttbar", "ztautau"]
    pre_factor_dict:
      htautau: 1.0
      ttbar: 1.0
      ztautau: 1.0
    
  output:
    plots_dir: "./output/plots/preselection_network"