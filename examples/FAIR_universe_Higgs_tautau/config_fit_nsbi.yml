General:
  Measurement:
    Name: higgs_tautau_signal_strength
    ParametersToFit:
      - mu_htautau
      - mu_ztautau
      - mu_ttbar
      - TES
      - JES
    POI: mu_htautau

Samples:
  - Name: ztautau
    Tree: tree_ztautau
    SamplePath: ./saved_datasets/dataset_nominal.root
    Weight: weights
    UseAsReference: False
    UseAsBasis: True
    Data: False

  - Name: ttbar
    Tree: tree_ttbar
    SamplePath: ./saved_datasets/dataset_nominal.root
    Weight: weights
    UseAsReference: True
    UseAsBasis: True
    Data: False

  - Name: htautau
    Tree: tree_htautau
    SamplePath: ./saved_datasets/dataset_nominal.root
    Weight: weights
    UseAsReference: True
    UseAsBasis: True
    Data: False

  - Name: data
    Tree: tree_data
    SamplePath: ./saved_datasets/dataset_nominal.root
    Weight: weights
    UseAsReference: False
    UseAsBasis: False
    Data: True

NormFactors:
  - Name: "mu_htautau"
    Samples: "htautau"
    Nominal: 1
    Bounds: [0, 10]
  - Name: "mu_ztautau"
    Samples: "ztautau"
    Nominal: 1
    Bounds: [0, 10]
  - Name: "mu_ttbar"
    Samples: "ttbar"
    Nominal: 1
    Bounds: [0, 10]

Systematics:
  - Name: JES
    Type: NormPlusShape
    Nominal: 0
    Samples:
      - htautau
      - ztautau
      - ttbar
    Up:
      - SampleName: htautau
        Path: ./saved_datasets/dataset_JES_up.root
        Tree: tree_htautau
        Weight: weights
      - SampleName: ztautau
        Path: ./saved_datasets/dataset_JES_up.root
        Tree: tree_ztautau
        Weight: weights
      - SampleName: ttbar
        Path: ./saved_datasets/dataset_JES_up.root
        Tree: tree_ttbar
        Weight: weights
    Dn:
      - SampleName: htautau
        Path: ./saved_datasets/dataset_JES_dn.root
        Tree: tree_htautau
        Weight: weights
      - SampleName: ztautau
        Path: ./saved_datasets/dataset_JES_dn.root
        Tree: tree_ztautau
        Weight: weights
      - SampleName: ttbar
        Path: ./saved_datasets/dataset_JES_dn.root
        Tree: tree_ttbar
        Weight: weights
  - Name: TES
    Type: NormPlusShape
    Nominal: 0
    Samples:
      - htautau
      - ztautau
      - ttbar
    Up:
      - SampleName: htautau
        Path: ./saved_datasets/dataset_TES_up.root
        Tree: tree_htautau
        Weight: weights
      - SampleName: ztautau
        Path: ./saved_datasets/dataset_TES_up.root
        Tree: tree_ztautau
        Weight: weights
      - SampleName: ttbar
        Path: ./saved_datasets/dataset_TES_up.root
        Tree: tree_ttbar
        Weight: weights
    Dn:
      - SampleName: htautau
        Path: ./saved_datasets/dataset_TES_dn.root
        Tree: tree_htautau
        Weight: weights
      - SampleName: ztautau
        Path: ./saved_datasets/dataset_TES_dn.root
        Tree: tree_ztautau
        Weight: weights
      - SampleName: ttbar
        Path: ./saved_datasets/dataset_TES_dn.root
        Tree: tree_ttbar
        Weight: weights

TrainingFeatures:
  - DER_mass_transverse_met_lep
  - log_DER_mass_vis
  - log_DER_pt_h
  - DER_deltar_had_lep
  - log_DER_pt_tot
  - log_DER_sum_pt
  - DER_pt_ratio_lep_had
  - DER_met_phi_centrality

TrainingFeaturesToStandardize:
  - DER_mass_transverse_met_lep
  - log_DER_mass_vis
  - log_DER_pt_h
  - DER_deltar_had_lep
  - log_DER_pt_tot
  - log_DER_sum_pt
  - DER_pt_ratio_lep_had
  - DER_met_phi_centrality

Regions:
  - Name: CR
    Filter: presel_score<-1.0
    Variable: presel_score
    Type: binned
    Binning:
      - -8.75
      - -4.
      - -2.5
      - -1.0
  - Name: SR_binned
    Filter: presel_score>4.5
    Variable: presel_score
    Type: binned
    Binning:
      - 4.5
      - 5.
  - Name: SR
    Filter: presel_score>=-1.0 & presel_score<=4.5
    Type: unbinned

TrainedModels:
  - RegionName: SR
    Weights: ./saved_datasets/asimov_weights.npy
    Models:
      - SampleName: ztautau
        Nominal:
          Ratios: ./saved_datasets/output_training_nominal/output_ratios_ztautau/ratios_ztautau.npy

        Systematics:
          - SystName: TES
            RatiosUp: ./saved_datasets/output_training_nominal/output_ratios_ztautau/ratios_ztautau_TES_up.npy
            RatiosDn: ./saved_datasets/output_training_nominal/output_ratios_ztautau/ratios_ztautau_TES_dn.npy
          - SystName: JES
            RatiosUp: ./saved_datasets/output_training_nominal/output_ratios_ztautau/ratios_ztautau_JES_up.npy
            RatiosDn: ./saved_datasets/output_training_nominal/output_ratios_ztautau/ratios_ztautau_JES_dn.npy
      - SampleName: htautau
        Nominal:
          Ratios: ./saved_datasets/output_training_nominal/output_ratios_htautau/ratios_htautau.npy
        Systematics:
          - SystName: TES
            RatiosUp: ./saved_datasets/output_training_nominal/output_ratios_htautau/ratios_htautau_TES_up.npy
            RatiosDn: ./saved_datasets/output_training_nominal/output_ratios_htautau/ratios_htautau_TES_dn.npy
          - SystName: JES
            RatiosUp: ./saved_datasets/output_training_nominal/output_ratios_htautau/ratios_htautau_JES_up.npy
            RatiosDn: ./saved_datasets/output_training_nominal/output_ratios_htautau/ratios_htautau_JES_dn.npy
      - SampleName: ttbar
        Nominal:
          Ratios: ./saved_datasets/output_training_nominal/output_ratios_ttbar/ratios_ttbar.npy
        Systematics:
          - SystName: TES
            RatiosUp: ./saved_datasets/output_training_nominal/output_ratios_ttbar/ratios_ttbar_TES_up.npy
            RatiosDn: ./saved_datasets/output_training_nominal/output_ratios_ttbar/ratios_ttbar_TES_dn.npy
          - SystName: JES
            RatiosUp: ./saved_datasets/output_training_nominal/output_ratios_ttbar/ratios_ttbar_JES_up.npy
            RatiosDn: ./saved_datasets/output_training_nominal/output_ratios_ttbar/ratios_ttbar_JES_dn.npy
